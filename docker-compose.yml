services:

  # ── Core: queue processor + API + SQLite ──────────────────────
  core:
    build:
      context: .
      dockerfile: docker/Dockerfile.core
      additional_contexts:
        tinyclaw: ${TINYCLAW_PATH:-../tinyclaw}
    volumes:
      - tinyclaw-data:/data
      - workspaces:/workspaces
    environment:
      - TINYCLAW_HOME=/data
      - TINYCLAW_API_PORT=3777
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - core
    restart: unless-stopped

  # ── Gateway: auth, proxy, task dispatch, metrics ─────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - API_KEY=${API_KEY}
      - UPSTREAM=http://core:3777
    networks:
      - core
      - workers
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped

  # ── Channel clients ─────────────────────────────────────────
  discord:
    build:
      context: .
      dockerfile: docker/Dockerfile.channel
      additional_contexts:
        tinyclaw: ${TINYCLAW_PATH:-../tinyclaw}
      args:
        CHANNEL: discord
    network_mode: "service:core"
    volumes:
      - tinyclaw-data:/data
    environment:
      - TINYCLAW_HOME=/data
      - TINYCLAW_API_PORT=3777
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["discord", "all"]

  telegram:
    build:
      context: .
      dockerfile: docker/Dockerfile.channel
      additional_contexts:
        tinyclaw: ${TINYCLAW_PATH:-../tinyclaw}
      args:
        CHANNEL: telegram
    network_mode: "service:core"
    volumes:
      - tinyclaw-data:/data
    environment:
      - TINYCLAW_HOME=/data
      - TINYCLAW_API_PORT=3777
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["telegram", "all"]

  whatsapp:
    build:
      context: .
      dockerfile: docker/Dockerfile.whatsapp
      additional_contexts:
        tinyclaw: ${TINYCLAW_PATH:-../tinyclaw}
    network_mode: "service:core"
    volumes:
      - tinyclaw-data:/data
      - whatsapp-session:/app/.tinyclaw/whatsapp-session
    environment:
      - TINYCLAW_HOME=/data
      - TINYCLAW_API_PORT=3777
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["whatsapp", "all"]

  # ── Example worker (isolated agent execution) ────────────────
  # Uncomment or define your own in docker-compose.override.yml.
  #
  # worker-coder:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker
  #   environment:
  #     - GATEWAY_URL=http://gateway:8080
  #     - API_KEY=${API_KEY}
  #     - AGENT_ID=coder
  #     - PROVIDER=anthropic
  #     - MODEL=sonnet
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
  #   volumes:
  #     - code-workspace:/workspace
  #   networks:
  #     - workers
  #   depends_on:
  #     gateway:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   profiles: ["workers"]
  #
  # worker-reviewer:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker
  #   environment:
  #     - GATEWAY_URL=http://gateway:8080
  #     - API_KEY=${API_KEY}
  #     - AGENT_ID=reviewer
  #     - PROVIDER=anthropic
  #     - MODEL=sonnet
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
  #   volumes:
  #     - code-workspace:/workspace:ro    # read-only access
  #   networks:
  #     - workers
  #   depends_on:
  #     gateway:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   profiles: ["workers"]

  # ── Monitoring ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - core
      - workers
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    profiles: ["monitoring"]

volumes:
  tinyclaw-data:
  workspaces:
  whatsapp-session:
  prometheus-data:

networks:
  core:
  workers:
